<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Swedish Public Transport — app icon.
    Stylised bus front view. Pure vector (no embedded raster).
    White silhouette on transparent: Homey's brandColor (#0070C0) shows
    through the cut-outs as the windshield, headlights and grille.
  -->

  <!-- Bus body: rounded-top with two small wheel bumps at the bottom -->
  <path fill="#ffffff" d="
    M30 16
    Q30 12 34 12
    H66
    Q70 12 70 16
    V80
    Q70 84 66 84
    H60
    V88
    H54
    V84
    H46
    V88
    H40
    V84
    H34
    Q30 84 30 80
    Z"/>

  <!-- Windshield: two windows split by a centre pillar (brand colour shows through) -->
  <rect x="34" y="20" width="14" height="13" rx="2" fill="#0070C0"/>
  <rect x="52" y="20" width="14" height="13" rx="2" fill="#0070C0"/>

  <!-- Horizontal trim line under the windshield -->
  <rect x="32" y="40" width="36" height="2" fill="#0070C0"/>

  <!-- Headlights -->
  <circle cx="38" cy="48" r="2.5" fill="#0070C0"/>
  <circle cx="62" cy="48" r="2.5" fill="#0070C0"/>

  <!-- Grille / front door -->
  <rect x="44" y="54" width="12" height="22" rx="1.5" fill="#0070C0"/>
</svg>
