<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clock ring: outer circle minus inner circle via evenodd -->
  <path fill-rule="evenodd" fill="#000" d="
    M10 50 A40 40 0 1 0 90 50 A40 40 0 1 0 10 50 Z
    M22 50 A28 28 0 1 0 78 50 A28 28 0 1 0 22 50 Z
  "/>
  <!-- Hour hand pointing up -->
  <rect x="47" y="24" width="6" height="22" rx="3" fill="#000"/>
  <!-- Minute hand pointing right -->
  <rect x="50" y="47" width="18" height="6" rx="3" fill="#000"/>
  <!-- Center pivot -->
  <circle cx="50" cy="50" r="5" fill="#000"/>
</svg>
