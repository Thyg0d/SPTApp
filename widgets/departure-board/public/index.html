<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Layout ─────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--homey-text-color);
      background: transparent;
      overflow-y: auto;
    }

    .widget {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* One block per selected board; subtle divider between boards. */
    .board {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .board + .board {
      border-top: var(--homey-line, 1px solid rgba(128,128,128,0.2));
      padding-top: 12px;
    }

    /* ── Stop name ───────────────────────────────────────────────────── */
    .stop-name {
      font-size: var(--homey-font-size-small, 14px);
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--homey-text-color-blue);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main departure row ──────────────────────────────────────────── */
    .departure-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .line-badge {
      min-width: 42px;
      height: 42px;
      border-radius: var(--homey-border-radius-default, 8px);
      background: var(--homey-text-color-blue);
      color: var(--homey-text-color-white, #fff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--homey-font-size-small, 14px);
      font-weight: 700;
      flex-shrink: 0;
      padding: 0 6px;
      white-space: nowrap;
    }

    .middle {
      flex: 1;
      min-width: 0;
    }

    .destination {
      font-size: var(--homey-font-size-default, 17px);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time-delay {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .dep-time {
      font-size: var(--homey-font-size-small, 14px);
      color: var(--homey-text-color-light);
    }

    .delay-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .delay-late      { color: var(--homey-text-color-orange); background: rgba(255,165,0,0.15); }
    .delay-cancelled { color: var(--homey-text-color-red);    background: rgba(255,0,0,0.12);   }

    /* ── Countdown ───────────────────────────────────────────────────── */
    .countdown-col { flex-shrink: 0; text-align: right; }

    .countdown {
      font-size: var(--homey-font-size-xxlarge, 32px);
      font-weight: 700;
      line-height: 1;
    }
    .countdown-unit {
      font-size: var(--homey-font-size-small, 14px);
      font-weight: 400;
      color: var(--homey-text-color-light);
    }
    .c-green  { color: var(--homey-text-color-green);  }
    .c-orange { color: var(--homey-text-color-orange); }
    .c-red    { color: var(--homey-text-color-red);    }

    /* ── Footer ──────────────────────────────────────────────────────── */
    hr.sep {
      border: none;
      border-top: var(--homey-line, 1px solid rgba(128,128,128,0.2));
      margin: 0;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--homey-text-color-light);
    }

    /* ── Empty / error states ────────────────────────────────────────── */
    .center-msg {
      min-height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--homey-font-size-small, 14px);
      color: var(--homey-text-color-light);
      text-align: center;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div id="root"><div class="center-msg">Loading…</div></div>

  <script>
    /* Cap the widget height; beyond this the board list scrolls. */
    var MAX_HEIGHT = 460;
    var homeyRef = null;

    /* ── Entry point ─────────────────────────────────────────────────── */
    function onHomeyReady(Homey) {
      homeyRef = Homey;

      // Device(s) picked in the widget's top-level `devices` setting are
      // returned synchronously as an array of Homey manager device IDs.
      var ids = Homey.getDeviceIds() || [];

      if (!ids.length) {
        showMsg('Choose one or more Transport Boards in widget settings');
        Homey.ready({ height: 96 });
        return;
      }

      // First load: surface any error so we never sit silently on "Loading…".
      fetchAndRender(ids, true)
        .then(() => {
          Homey.ready({ height: currentHeight() });
          // Subsequent polls keep the last good view on transient errors.
          setInterval(() => fetchAndRender(ids, false), 30000);
        })
        .catch(err => {
          console.error(err);
          showMsg('Could not load widget');
          Homey.ready({ height: 96 });
        });
    }

    /* ── Data fetch ──────────────────────────────────────────────────── */
    function fetchAndRender(ids, showErrors) {
      var qs = ids.map(encodeURIComponent).join(',');
      return homeyRef.api('GET', `/departures?deviceIds=${qs}`)
        .then(boards => { render(boards); fit(); })
        .catch(err => {
          console.error('API error:', err);
          if (showErrors) {
            var msg = (err && (err.message || err.error)) || String(err);
            showMsg(msg);
            fit();
          }
          // On later polls, keep the last rendered view on transient errors.
        });
    }

    /* ── Render ──────────────────────────────────────────────────────── */
    function render(boards) {
      if (!Array.isArray(boards) || !boards.length) {
        showMsg('No boards to show');
        return;
      }
      var html = boards.map(boardHtml).join('');
      document.getElementById('root').innerHTML = `<div class="widget">${html}</div>`;
    }

    function boardHtml(d) {
      if (d && d.error) {
        return `<div class="board"><div class="stop-name">${x(d.stopName || 'Board unavailable')}</div>
                <div class="dep-time">No data available</div></div>`;
      }

      var mins        = typeof d.minutesUntil === 'number' ? d.minutesUntil : 0;
      var isCancelled = (d.status || '').toLowerCase().startsWith('cancel');
      var isDelayed   = !isCancelled && (d.delayMinutes || 0) > 0;

      // Countdown colour
      var cClass, cHtml;
      if (isCancelled) {
        cClass = 'c-red'; cHtml = '✕';
      } else if (mins <= 0) {
        cClass = 'c-red';    cHtml = 'Now';
      } else if (mins <= 5) {
        cClass = 'c-orange'; cHtml = `${mins}<span class="countdown-unit"> min</span>`;
      } else {
        cClass = 'c-green';  cHtml = `${mins}<span class="countdown-unit"> min</span>`;
      }

      // Delay tag
      var delayHtml = '';
      if (isCancelled) {
        delayHtml = `<span class="delay-tag delay-cancelled">Cancelled</span>`;
      } else if (isDelayed) {
        delayHtml = `<span class="delay-tag delay-late">+${d.delayMinutes} min</span>`;
      }

      return `
        <div class="board">
          <div class="stop-name">${x(d.stopName || '—')}</div>
          <div class="departure-row">
            <div class="line-badge">${x(d.line || '?')}</div>
            <div class="middle">
              <div class="destination">${x(d.destination || '—')}</div>
              <div class="time-delay">
                <span class="dep-time">${x(d.nextDeparture)}</span>
                ${delayHtml}
              </div>
            </div>
            <div class="countdown-col">
              <div class="countdown ${cClass}">${cHtml}</div>
            </div>
          </div>
          <div class="footer">
            <span>${x(d.status || '')}</span>
            <span>${x(d.lastUpdated || '')}</span>
          </div>
        </div>
      `;
    }

    /* Size the widget to its content, capped at MAX_HEIGHT (then it scrolls). */
    function currentHeight() {
      var h = Math.ceil(document.getElementById('root').scrollHeight) + 2;
      return Math.min(h, MAX_HEIGHT);
    }
    function fit() {
      if (homeyRef && homeyRef.setHeight) homeyRef.setHeight(currentHeight());
    }

    function showMsg(msg) {
      document.getElementById('root').innerHTML =
        `<div class="center-msg">${x(msg)}</div>`;
    }

    function x(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
